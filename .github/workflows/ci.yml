name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: buysell
          POSTGRES_PASSWORD: buysell
          POSTGRES_DB: buysell
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U buysell -d buysell"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://buysell:buysell@localhost:5432/buysell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit
        run: npm run audit:prod

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Prisma validation
        run: npm run prisma:validate

      - name: Prisma migration smoke test
        run: npm run prisma:deploy

      - name: Test
        run: npm run test

      - name: Lint validation
        run: npm run lint
